name: Build iOS IPA (Sideload)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios

      - name: Build Unsigned IPA
        run: |
          cd ios
          # Garante que os Pods estão instalados
          pod install
          
          # Build usando xcodebuild com flags para ignorar assinatura
          xcodebuild -workspace Nubank.xcworkspace \
            -scheme Nubank \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            OTHER_LDFLAGS="\$(inherited) -Wl,-no_compact_unwind"
          
          # Cria a estrutura da Payload para o IPA
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/Nubank.app Payload/
          zip -r ../Nubank.ipa Payload
          cd ..

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nubank-Unsigned-IPA
          path: Nubank.ipa
          retention-days: 5
