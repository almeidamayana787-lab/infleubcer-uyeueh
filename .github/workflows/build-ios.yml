name: Build iOS (Sideloadly)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios

      - name: Build Unsigned App
        run: |
          cd ios
          SCHEME=$(ls -d *.xcodeproj | sed 's/\.xcodeproj//')
          echo "Using scheme: $SCHEME"
          
          if ls *.xcworkspace >/dev/null 2>&1; then
            WORKSPACE_ARGS="-workspace $(ls -d *.xcworkspace | head -n 1)"
          else
            WORKSPACE_ARGS="-project $(ls -d *.xcodeproj | head -n 1)"
          fi
          
          xcodebuild $WORKSPACE_ARGS \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS=arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r NubankMirror_Unsigned.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NubankMirror_Unsigned
          path: NubankMirror_Unsigned.ipa
